<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Galeri Arabian Night</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("BG.png") no-repeat center center fixed;
    background-size: cover;
    color: #fff;
  }

  body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
  }

  h1 {
    text-align: center;
    padding: 20px;
    color: gold;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(255,215,0,0.7);
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .card {
    background: rgba(0, 0, 0, 0.5);
    border-radius: 10px;
    overflow: hidden;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 215, 0, 0.3);
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
  }

  .card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
  }

  .card-content {
    padding: 12px;
  }

  .card-title {
    font-size: 14px;
    color: #f5d67b;
  }

  .img-wrapper {
    position: relative;
  }

  .btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.7);
    color: gold;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 5px;
  }

  a {
    text-decoration: none;
    color: inherit;
  }
</style>
</head>

<body>

<h1>KUMPULAN DZIKIR/DOA SDIT TIHAMAH</h1>

<div class="container">

  <!-- CARD 1 -->
  <div class="card">
    <a href="https://drive.google.com/file/d/1OS1yRYGtYgbMCZNV1pRnQ_rmulfWFodr/view"_blank">
      <div class="img-wrapper">
        <img src="IBTIHAL ARAFAH.png">
        
      </div>
    </a>
    <div class="card-content">
      <div class="card-title">IBTIHAL ARAFAH</div>
    </div>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <a href="https://drive.google.com/file/d/1JTl0AjOzQME5ADYExxSi0ztmkp1rtZlu/view?usp=sharing">
      <img src="5.png">
    </a>
    <div class="card-content">

    </div>
  </div>

    <div class="card-content">

    <div class="card-content">
      <div class="card-title">DOA IBTIHAL AKHIR DAN AWAL TAHUN</div>

</div>

</body>
</html>
